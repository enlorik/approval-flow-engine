spring.application.name=approval-flow-engine
spring.profiles.active=dev

# JWT
# Override APP_JWT_SECRET in production via environment variable
app.jwt.secret=${APP_JWT_SECRET:approval-flow-engine-dev-secret-key-that-is-long-enough-for-hs256}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# Actuator
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.com.approvalflow=DEBUG
